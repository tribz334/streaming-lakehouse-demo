<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; fill: #111827; }
    .title { font-size: 24px; font-weight: 600; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .group { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; stroke-dasharray: 6 4; rx: 14; ry: 14; }
    .node { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 10; ry: 10; }
    .node-blue { fill: #eff6ff; stroke: #93c5fd; }
    .node-green { fill: #f0fdf4; stroke: #86efac; }
    .node-orange { fill: #fff7ed; stroke: #fdba74; }
    .node-purple { fill: #faf5ff; stroke: #d8b4fe; }
    .name { font-size: 17px; font-weight: 600; }
    .desc { font-size: 12px; fill: #6b7280; }
    .legend { font-size: 12px; fill: #6b7280; }
    .label { font-size: 12px; fill: #374151; }
    .small { font-size: 11px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="60" y="48" class="title">Grafana 在本项目中的作用与操作流程</text>
  <text x="60" y="72" class="subtitle">USTC Streaming Lakehouse Demo: Grafana 作为运维观测前端，统一查询 Prometheus 指标与 Loki 日志，并向值班人员展示与告警。</text>

  <rect x="50" y="105" width="1100" height="120" class="group"/>
  <text x="70" y="130" class="name">1. 启动与接入层</text>

  <rect x="80" y="150" width="220" height="54" class="node node-orange"/>
  <text x="190" y="173" text-anchor="middle" class="name">运维人员</text>
  <text x="190" y="191" text-anchor="middle" class="desc">启动、查看、排障</text>

  <rect x="360" y="150" width="320" height="54" class="node node-orange"/>
  <text x="520" y="173" text-anchor="middle" class="name">start-multi-node.ps1 -WithOps</text>
  <text x="520" y="191" text-anchor="middle" class="desc">拉起 prometheus / grafana / loki</text>

  <rect x="760" y="150" width="320" height="54" class="node"/>
  <text x="920" y="173" text-anchor="middle" class="name">Docker Compose ops profile</text>
  <text x="920" y="191" text-anchor="middle" class="desc">端口 19090 / 13000 / 13100</text>

  <path d="M300 177 L360 177" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="330" y="169" text-anchor="middle" class="label">执行脚本</text>
  <path d="M680 177 L760 177" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="720" y="169" text-anchor="middle" class="label">启动容器</text>

  <rect x="50" y="250" width="1100" height="300" class="group"/>
  <text x="70" y="275" class="name">2. 观测数据流</text>

  <rect x="95" y="315" width="220" height="76" class="node node-green"/>
  <text x="205" y="342" text-anchor="middle" class="name">Flink / Kafka / StarRocks</text>
  <text x="205" y="360" text-anchor="middle" class="desc">业务组件暴露指标</text>
  <text x="205" y="376" text-anchor="middle" class="desc">如 /metrics, JMX Exporter</text>

  <rect x="95" y="438" width="220" height="76" class="node node-purple"/>
  <text x="205" y="465" text-anchor="middle" class="name">容器 stdout / 日志文件</text>
  <text x="205" y="483" text-anchor="middle" class="desc">运行日志、异常堆栈</text>
  <text x="205" y="499" text-anchor="middle" class="desc">供 Loki 检索</text>

  <rect x="405" y="315" width="210" height="76" class="node node-green"/>
  <text x="510" y="342" text-anchor="middle" class="name">Prometheus</text>
  <text x="510" y="360" text-anchor="middle" class="desc">主动 scrape 指标</text>
  <text x="510" y="376" text-anchor="middle" class="desc">写入本地 TSDB</text>

  <rect x="405" y="438" width="210" height="76" class="node node-purple"/>
  <text x="510" y="465" text-anchor="middle" class="name">Loki</text>
  <text x="510" y="483" text-anchor="middle" class="desc">集中存放与检索日志</text>
  <text x="510" y="499" text-anchor="middle" class="desc">按标签过滤</text>

  <rect x="705" y="375" width="220" height="92" class="node node-blue"/>
  <text x="815" y="406" text-anchor="middle" class="name">Grafana</text>
  <text x="815" y="426" text-anchor="middle" class="desc">统一前端</text>
  <text x="815" y="444" text-anchor="middle" class="desc">Dashboard + Explore + Alert</text>

  <rect x="980" y="315" width="130" height="76" class="node node-orange"/>
  <text x="1045" y="342" text-anchor="middle" class="name">Dashboard</text>
  <text x="1045" y="360" text-anchor="middle" class="desc">看趋势</text>
  <text x="1045" y="376" text-anchor="middle" class="desc">看状态</text>

  <rect x="980" y="438" width="130" height="76" class="node node-orange"/>
  <text x="1045" y="465" text-anchor="middle" class="name">Alert</text>
  <text x="1045" y="483" text-anchor="middle" class="desc">阈值越限</text>
  <text x="1045" y="499" text-anchor="middle" class="desc">通知值班</text>

  <path d="M315 353 L405 353" stroke="#16a34a" stroke-width="2.3" fill="none" marker-end="url(#arrow-green)"/>
  <text x="360" y="345" text-anchor="middle" class="label">指标暴露</text>
  <path d="M315 476 L405 476" stroke="#6b7280" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow-gray)"/>
  <text x="360" y="468" text-anchor="middle" class="label">日志汇聚</text>

  <path d="M615 353 L705 401" stroke="#2563eb" stroke-width="2.3" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="664" y="362" text-anchor="middle" class="label">查询指标</text>
  <path d="M615 476 L705 441" stroke="#2563eb" stroke-width="2.3" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="663" y="472" text-anchor="middle" class="label">查询日志</text>

  <path d="M925 404 L980 353" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="953" y="372" text-anchor="middle" class="label">页面展示</text>
  <path d="M925 438 L980 476" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="950" y="456" text-anchor="middle" class="label">告警触发</text>

  <rect x="50" y="575" width="1100" height="105" class="group"/>
  <text x="70" y="600" class="name">3. 实际使用闭环</text>

  <rect x="95" y="620" width="180" height="38" class="node"/>
  <text x="185" y="644" text-anchor="middle" class="desc">启动 `-WithOps`</text>

  <rect x="315" y="620" width="180" height="38" class="node"/>
  <text x="405" y="644" text-anchor="middle" class="desc">打开 `http://127.0.0.1:13000`</text>

  <rect x="535" y="620" width="180" height="38" class="node"/>
  <text x="625" y="644" text-anchor="middle" class="desc">查看 `USTC Flink Overview`</text>

  <rect x="755" y="620" width="180" height="38" class="node"/>
  <text x="845" y="644" text-anchor="middle" class="desc">联查 Prometheus / Loki</text>

  <rect x="975" y="620" width="130" height="38" class="node"/>
  <text x="1040" y="644" text-anchor="middle" class="desc">定位并告警</text>

  <path d="M275 639 L315 639" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M495 639 L535 639" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M715 639 L755 639" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M935 639 L975 639" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <g transform="translate(70,688)">
    <line x1="0" y1="-12" x2="32" y2="-12" stroke="#16a34a" stroke-width="2.3" marker-end="url(#arrow-green)"/>
    <text x="42" y="-8" class="legend">指标采集链路</text>
    <line x1="170" y1="-12" x2="202" y2="-12" stroke="#2563eb" stroke-width="2.3" marker-end="url(#arrow-blue)"/>
    <text x="212" y="-8" class="legend">Grafana 查询链路</text>
    <line x1="372" y1="-12" x2="404" y2="-12" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="414" y="-8" class="legend">操作 / 展示 / 告警动作</text>
    <line x1="662" y1="-12" x2="694" y2="-12" stroke="#6b7280" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/>
    <text x="704" y="-8" class="legend">日志汇聚链路</text>
  </g>
</svg>
