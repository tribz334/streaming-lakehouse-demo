# Single-host, three-logical-node overlay used to reproduce the thesis topology.
# All containers still share one physical Docker host; labels document placement.
x-kafka-common: &kafka-common
  image: apache/kafka:3.9.1
  profiles: ["multi-node"]
  environment: &kafka-environment
    CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093,2@kafka-node-2:9093,3@kafka-node-3:9093
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_DEFAULT_REPLICATION_FACTOR: 3
    KAFKA_MIN_INSYNC_REPLICAS: 2
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
  healthcheck:
    test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
    interval: 10s
    timeout: 5s
    retries: 30

services:
  mysql:
    hostname: node-1-mysql
    labels:
      thesis.node: node-1
      thesis.role: source-control

  kafka:
    hostname: kafka
    labels:
      thesis.node: node-1
      thesis.role: kafka-broker-controller
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://${KAFKA_EXTERNAL}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093,2@kafka-node-2:9093,3@kafka-node-3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-node-1-data:/var/lib/kafka/data

  kafka-node-2:
    <<: *kafka-common
    hostname: kafka-node-2
    labels:
      thesis.node: node-2
      thesis.role: kafka-broker-controller
    environment:
      <<: *kafka-environment
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-node-2:9092
    volumes:
      - kafka-node-2-data:/var/lib/kafka/data

  kafka-node-3:
    <<: *kafka-common
    hostname: kafka-node-3
    labels:
      thesis.node: node-3
      thesis.role: kafka-broker-controller
    environment:
      <<: *kafka-environment
      KAFKA_NODE_ID: 3
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-node-3:9092
    volumes:
      - kafka-node-3-data:/var/lib/kafka/data

  kafka-init-three-node:
    image: apache/kafka:3.9.1
    profiles: ["multi-node"]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-node-2:
        condition: service_healthy
      kafka-node-3:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - >-
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092
        --create --if-not-exists --topic ods_log --partitions 6
        --replication-factor 3 --config min.insync.replicas=2
    labels:
      thesis.node: node-1
      thesis.role: cluster-bootstrap

  flink-jobmanager:
    hostname: node-1-flink-jobmanager
    labels:
      thesis.node: node-1
      thesis.role: flink-control
    volumes:
      - warehouse-three-node:/warehouse
      - ./flink/sql:/opt/flink/usrlib/sql:ro

  flink-taskmanager:
    hostname: node-1-flink-taskmanager
    labels:
      thesis.node: node-1
      thesis.role: flink-compute
    volumes:
      - warehouse-three-node:/warehouse

  flink-taskmanager-node-2:
    labels:
      thesis.node: node-2
      thesis.role: flink-compute
    volumes:
      - warehouse-three-node:/warehouse

  flink-taskmanager-node-3:
    labels:
      thesis.node: node-3
      thesis.role: flink-compute
    volumes:
      - warehouse-three-node:/warehouse

  event-generator:
    labels:
      thesis.node: node-1
      thesis.role: event-ingestion
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092,kafka-node-2:9092,kafka-node-3:9092
    depends_on:
      kafka-init-three-node:
        condition: service_completed_successfully

  event-generator-node-2:
    labels:
      thesis.node: node-2
      thesis.role: event-ingestion
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092,kafka-node-2:9092,kafka-node-3:9092
    depends_on:
      kafka-init-three-node:
        condition: service_completed_successfully

  event-generator-node-3:
    labels:
      thesis.node: node-3
      thesis.role: event-ingestion
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092,kafka-node-2:9092,kafka-node-3:9092
    depends_on:
      kafka-init-three-node:
        condition: service_completed_successfully

  starrocks:
    labels:
      thesis.node: node-1
      thesis.role: starrocks-fe
    volumes:
      - starrocks-fe-meta:/opt/starrocks/fe/meta
      - warehouse-three-node:/warehouse
      - ./starrocks/conf/fe.conf:/demo-conf/fe.conf:ro
      - ./starrocks:/docker-entrypoint-initdb.d:ro

  starrocks-be:
    hostname: node-1-starrocks-be
    labels:
      thesis.node: node-1
      thesis.role: starrocks-be
    volumes:
      - starrocks-be-storage:/opt/starrocks/be/storage
      - warehouse-three-node:/warehouse
      - ./starrocks/conf/be.conf:/demo-conf/be.conf:ro

  starrocks-be-node-2:
    image: starrocks/be-ubuntu:3.1-latest
    profiles: ["multi-node-olap"]
    hostname: starrocks-be-node-2
    command: ["/opt/starrocks/be_entrypoint.sh", "starrocks"]
    environment:
      HOST_TYPE: FQDN
      LOG_CONSOLE: "1"
      CONFIGMAP_MOUNT_PATH: /demo-conf
    volumes:
      - starrocks-be-node-2-storage:/opt/starrocks/be/storage
      - warehouse-three-node:/warehouse
      - ./starrocks/conf/be.conf:/demo-conf/be.conf:ro
    depends_on:
      starrocks:
        condition: service_healthy
    labels:
      thesis.node: node-2
      thesis.role: starrocks-be

  starrocks-be-node-3:
    image: starrocks/be-ubuntu:3.1-latest
    profiles: ["multi-node-olap"]
    hostname: starrocks-be-node-3
    command: ["/opt/starrocks/be_entrypoint.sh", "starrocks"]
    environment:
      HOST_TYPE: FQDN
      LOG_CONSOLE: "1"
      CONFIGMAP_MOUNT_PATH: /demo-conf
    volumes:
      - starrocks-be-node-3-storage:/opt/starrocks/be/storage
      - warehouse-three-node:/warehouse
      - ./starrocks/conf/be.conf:/demo-conf/be.conf:ro
    depends_on:
      starrocks:
        condition: service_healthy
    labels:
      thesis.node: node-3
      thesis.role: starrocks-be

volumes:
  warehouse-three-node:
  kafka-node-1-data:
  kafka-node-2-data:
  kafka-node-3-data:
  starrocks-be-node-2-storage:
  starrocks-be-node-3-storage:
