services:
  mysql:
    image: mysql:8.4
    profiles: ["core"]
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.9.1
    profiles: ["core"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://${KAFKA_EXTERNAL}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  apicurio:
    image: apicurio/apicurio-registry:3.2.5
    profiles: ["governance"]
    environment:
      QUARKUS_HTTP_PORT: 8080
    ports:
      - "8081:8080"

  flink-jobmanager:
    build:
      context: ./flink
      args:
        FLINK_BASE_IMAGE: ${FLINK_BASE_IMAGE}
        PAIMON_VERSION: ${PAIMON_VERSION}
        FLINK_KAFKA_CONNECTOR_VERSION: ${FLINK_KAFKA_CONNECTOR_VERSION}
        FLINK_CDC_VERSION: ${FLINK_CDC_VERSION}
        MYSQL_CONNECTOR_VERSION: ${MYSQL_CONNECTOR_VERSION}
    image: ${FLINK_IMAGE}
    profiles: ["core"]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 1
        execution.checkpointing.interval: 10s
        state.backend.type: hashmap
        state.checkpoint-storage: filesystem
        state.checkpoints.dir: file:///warehouse/checkpoints
        rest.flamegraph.enabled: true
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    ports:
      - "8082:8081"
      - "19249:9249"
    volumes:
      - warehouse:/warehouse
      - ./flink/sql:/opt/flink/usrlib/sql:ro
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy

  flink-taskmanager:
    image: ${FLINK_IMAGE}
    pull_policy: never
    profiles: ["core"]
    hostname: flink-taskmanager-node-1
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 8
        taskmanager.memory.process.size: 3072m
        taskmanager.memory.jvm-metaspace.size: 256m
        taskmanager.memory.network.min: 128m
        taskmanager.memory.network.max: 256m
        parallelism.default: 1
        execution.checkpointing.interval: 10s
        state.backend.type: hashmap
        state.checkpoint-storage: filesystem
        state.checkpoints.dir: file:///warehouse/checkpoints
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    volumes:
      - warehouse:/warehouse
    depends_on:
      - flink-jobmanager

  flink-taskmanager-node-2:
    image: ${FLINK_IMAGE}
    pull_policy: never
    profiles: ["multi-node"]
    hostname: flink-taskmanager-node-2
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
        taskmanager.memory.jvm-metaspace.size: 256m
        taskmanager.memory.network.min: 128m
        taskmanager.memory.network.max: 256m
        parallelism.default: 3
        execution.checkpointing.interval: 10s
        state.backend.type: hashmap
        state.checkpoint-storage: filesystem
        state.checkpoints.dir: file:///warehouse/checkpoints
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    volumes:
      - warehouse:/warehouse
    depends_on:
      - flink-jobmanager

  flink-taskmanager-node-3:
    image: ${FLINK_IMAGE}
    pull_policy: never
    profiles: ["multi-node"]
    hostname: flink-taskmanager-node-3
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
        taskmanager.memory.jvm-metaspace.size: 256m
        taskmanager.memory.network.min: 128m
        taskmanager.memory.network.max: 256m
        parallelism.default: 3
        execution.checkpointing.interval: 10s
        state.backend.type: hashmap
        state.checkpoint-storage: filesystem
        state.checkpoints.dir: file:///warehouse/checkpoints
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    volumes:
      - warehouse:/warehouse
    depends_on:
      - flink-jobmanager

  event-generator:
    build:
      context: ./generator
    image: ustc/event-generator:latest
    profiles: ["core"]
    environment:
      GENERATOR_NODE_ID: ingest-node-1
      GENERATOR_RANDOM_SEED: 20260713
      GENERATOR_HISTORY_DAYS: 14
      GENERATOR_HISTORY_EVENTS_PER_DAY: 600
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL}
      TOPIC: ods_log
      EVENT_INTERVAL_SECONDS: 0.25
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      FRAUD_INJECTION_ENABLED: "true"
      FRAUD_BURST_EVERY: 180
      FRAUD_BURST_SIZE: 36
      FRAUD_USER_POOL: 3
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy

  event-generator-node-2:
    image: ustc/event-generator:latest
    pull_policy: never
    profiles: ["multi-node"]
    environment:
      GENERATOR_NODE_ID: ingest-node-2
      GENERATOR_RANDOM_SEED: 20260713
      GENERATOR_HISTORY_DAYS: 14
      GENERATOR_HISTORY_EVENTS_PER_DAY: 600
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL}
      TOPIC: ods_log
      EVENT_INTERVAL_SECONDS: 0.35
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      FRAUD_INJECTION_ENABLED: "true"
      FRAUD_BURST_EVERY: 240
      FRAUD_BURST_SIZE: 24
      FRAUD_USER_POOL: 3
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy

  event-generator-node-3:
    image: ustc/event-generator:latest
    pull_policy: never
    profiles: ["multi-node"]
    environment:
      GENERATOR_NODE_ID: ingest-node-3
      GENERATOR_RANDOM_SEED: 20260713
      GENERATOR_HISTORY_DAYS: 14
      GENERATOR_HISTORY_EVENTS_PER_DAY: 600
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL}
      TOPIC: ods_log
      EVENT_INTERVAL_SECONDS: 0.45
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      FRAUD_INJECTION_ENABLED: "true"
      FRAUD_BURST_EVERY: 300
      FRAUD_BURST_SIZE: 18
      FRAUD_USER_POOL: 3
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy

  starrocks:
    image: starrocks/fe-ubuntu:3.1-latest
    profiles: ["olap"]
    hostname: starrocks
    command: ["/opt/starrocks/fe_entrypoint.sh", "starrocks"]
    environment:
      HOST_TYPE: FQDN
      LOG_CONSOLE: "1"
      CONFIGMAP_MOUNT_PATH: /demo-conf
    ports:
      - "8030:8030"
      - "19030:9030"
      - "9010:9010"
    volumes:
      - starrocks-fe-meta:/opt/starrocks/fe/meta
      - warehouse:/warehouse
      - ./starrocks/conf/fe.conf:/demo-conf/fe.conf:ro
      - ./starrocks:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysql -h127.0.0.1 -P9030 -uroot -e 'SHOW FRONTENDS' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30

  starrocks-be:
    image: starrocks/be-ubuntu:3.1-latest
    profiles: ["olap"]
    hostname: starrocks-be
    command: ["/opt/starrocks/be_entrypoint.sh", "starrocks"]
    environment:
      HOST_TYPE: FQDN
      LOG_CONSOLE: "1"
      CONFIGMAP_MOUNT_PATH: /demo-conf
    ports:
      - "18040:8040"
      - "19050:9050"
      - "19060:9060"
    volumes:
      - starrocks-be-storage:/opt/starrocks/be/storage
      - warehouse:/warehouse
      - ./starrocks/conf/be.conf:/demo-conf/be.conf:ro
    depends_on:
      starrocks:
        condition: service_healthy

  superset:
    image: ${SUPERSET_IMAGE}
    profiles: ["bi"]
    environment:
      SUPERSET_SECRET_KEY: "ustc-streaming-lakehouse-demo-secret"
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    ports:
      - "8088:8088"
    depends_on:
      starrocks:
        condition: service_healthy
    volumes:
      - superset-home:/app/superset_home
      - ./superset:/app/pythonpath:ro
    command:
      - /bin/bash
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin --username admin --firstname USTC --lastname Demo --email admin@example.com --password admin || true &&
        superset init &&
        superset set-database-uri -d StarRocks -u mysql://root@starrocks:9030/ad_ads &&
        python /app/pythonpath/bootstrap_datasets.py &&
        python /app/pythonpath/bootstrap_dashboard.py &&
        superset run -h 0.0.0.0 -p 8088

  prometheus:
    image: prom/prometheus:v2.53.4
    profiles: ["ops"]
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.6.1
    profiles: ["ops"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "13000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.5.2
    profiles: ["ops"]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "13100:3100"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki

  hive-metastore:
    image: apache/hive:4.0.1
    profiles: ["metastore"]
    user: root
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionURL=jdbc:derby:;databaseName=/opt/hive/data/metastore_db;create=true
        -Djavax.jdo.option.ConnectionDriverName=org.apache.derby.jdbc.EmbeddedDriver
    ports:
      - "9083:9083"
    volumes:
      - hive-metastore-data:/opt/hive/data

  dolphinscheduler:
    build:
      context: ./dolphinscheduler
      dockerfile: Dockerfile
    image: apache/dolphinscheduler-standalone-server:3.3.2
    profiles: ["scheduler"]
    ports:
      - "12345:12345"
      - "25333:25333"
    volumes:
      - ./dolphinscheduler:/workspace/dolphinscheduler

volumes:
  mysql-data:
  kafka-data:
  warehouse:
  starrocks-fe-meta:
  starrocks-be-storage:
  superset-home:
  grafana-data:
  prometheus-data:
  loki-data:
  hive-metastore-data:
