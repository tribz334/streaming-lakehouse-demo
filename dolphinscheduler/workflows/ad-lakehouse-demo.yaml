project: ustc-streaming-lakehouse-demo

workflows:
  - name: ad_lakehouse_daily_offline
    description: Daily bounded lakehouse load defined by the thesis.
    schedule:
      cron: "0 0 2 * * ?"
      timezone: Asia/Shanghai
    tasks:
      - name: prepare_catalogs
        type: SHELL
      - name: ods_snapshot_check
        type: FLINK_SQL_BATCH
        sql: flink/sql/06_offline_ods_check.sql
        depends_on: [prepare_catalogs]
      - name: dim_snapshot_refresh
        type: FLINK_SQL_BATCH
        sql: flink/sql/07_offline_dim_snapshot.sql
        depends_on: [prepare_catalogs]
      - name: dws_theme_load
        type: FLINK_SQL_BATCH
        sql: flink/sql/08_offline_dws.sql
        depends_on: [ods_snapshot_check, dim_snapshot_refresh]
      - name: dm_layer_load
        type: FLINK_SQL_BATCH
        sql: flink/sql/09_offline_dm.sql
        depends_on: [dws_theme_load]
      - name: ads_retention
        type: FLINK_SQL_BATCH
        sql: flink/sql/10_ads_retention.sql
        depends_on: [ods_snapshot_check, dim_snapshot_refresh]
      - name: ads_attribution
        type: FLINK_SQL_BATCH
        sql: flink/sql/11_ads_attribution.sql
        depends_on: [dm_layer_load]
      - name: ads_antifraud
        type: FLINK_SQL_BATCH
        sql: flink/sql/12_ads_fraud.sql
        depends_on: [dm_layer_load]
      - name: ads_creative_offline
        type: FLINK_SQL_BATCH
        sql: flink/sql/13_ads_creative_offline.sql
        depends_on: [dws_theme_load]
      - name: publish_offline_receipt
        type: SHELL
        depends_on: [ads_retention, ads_attribution, ads_antifraud, ads_creative_offline]

  - name: ad_lakehouse_realtime_operations
    description: Manual stop-and-restart workflow for persistent streaming jobs.
    schedule: manual
    tasks:
      - name: stop_existing_stream_jobs
        type: FLINK_REST
      - name: prepare_realtime_resources
        type: SHELL
        depends_on: [stop_existing_stream_jobs]
      - name: start_ods_stream
        type: FLINK_SQL_STREAM
        sql: flink/sql/02_realtime_ods.sql
        depends_on: [prepare_realtime_resources]
      - name: refresh_dim_snapshot
        type: FLINK_SQL_BATCH
        sql: flink/sql/07_offline_dim_snapshot.sql
        depends_on: [prepare_realtime_resources]
      - name: start_dwd_stream
        type: FLINK_SQL_STREAM
        sql: flink/sql/03_realtime_dwd.sql
        depends_on: [start_ods_stream, refresh_dim_snapshot]
      - name: start_dws_metric_stream
        type: FLINK_SQL_STREAM
        sql: flink/sql/04_realtime_dws_metrics.sql
        depends_on: [start_dwd_stream]
      - name: start_starrocks_metric_relay
        type: FLINK_SQL_STREAM
        sql: flink/sql/05_realtime_starrocks_relay.sql
        depends_on: [start_dws_metric_stream]
      - name: verify_realtime_jobs
        type: FLINK_REST
        depends_on: [start_starrocks_metric_relay]
